<!DOCTYPE html>
<html>
<head>
    <title>PDF Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body id="app-body">

<div class="mode-toggle">
    <label class="switch">
        <input type="checkbox" id="mode-toggle-checkbox">
        <span class="slider"></span>
    </label>
</div>

<div class="container">
    <h1>PDF Finder</h1>

    <form id="form" method="post">
        <input type="text" name="query" placeholder="Enter search term" value="{{ query }}" required>
        
        <button type="submit">Search</button>
    </form>

    {% if pdfs %}
    <div class="results">
        <h2>PDF Search Results</h2>
        <ul>
            {% for pdf in pdfs %}
                <li><a href="{{ pdf }}" target="_blank">{{ pdf }}</a></li>
            {% endfor %}
        </ul>
    </div>
    {% elif query %}
    <div class="results">
        <p>No PDF results found for "{{ query }}".</p>
    </div>
    {% endif %}
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
